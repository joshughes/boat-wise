name: Frontend Check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  syntax:
    runs-on: "ubuntu-latest"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JavaScript syntax check
        run: node --check tidewise-card.js
