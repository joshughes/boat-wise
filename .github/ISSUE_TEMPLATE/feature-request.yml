name: Feature Request
description: Suggest a focused TideWise improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the workflow, station, location, or setup issue this would improve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like TideWise to do?
    validations:
      required: true
  - type: input
    id: tidewise_version
    attributes:
      label: TideWise version
      placeholder: v0.4.7
    validations:
      required: false
  - type: input
    id: station
    attributes:
      label: NOAA station ID or area
      placeholder: "8661070 / Cherry Grove, SC"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Screenshots, examples, or related apps/features are welcome.
    validations:
      required: false
